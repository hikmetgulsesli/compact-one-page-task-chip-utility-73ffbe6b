<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Short Editor - Compact One Page Task Chip Utility</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#ffede6",
                    "outline": "#737686",
                    "on-primary-container": "#eeefff",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "surface-dim": "#d8dadc",
                    "surface-variant": "#e0e3e5",
                    "primary": "#004ac6",
                    "primary-fixed-dim": "#b4c5ff",
                    "tertiary-fixed-dim": "#ffb596",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f7f9fb",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-error": "#ffffff",
                    "surface-container": "#eceef0",
                    "on-secondary": "#ffffff",
                    "tertiary": "#943700",
                    "inverse-on-surface": "#eff1f3",
                    "secondary": "#515f74",
                    "on-tertiary-fixed": "#360f00",
                    "tertiary-fixed": "#ffdbcd",
                    "secondary-fixed": "#d5e3fc",
                    "surface-container-high": "#e6e8ea",
                    "primary-container": "#2563eb",
                    "outline-variant": "#c3c6d7",
                    "on-secondary-fixed": "#0d1c2e",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "on-primary-fixed": "#00174b",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#434655",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#bc4800",
                    "secondary-fixed-dim": "#b9c7df",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#57657a",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container-low": "#f2f4f6",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#dbe1ff",
                    "on-background": "#191c1e",
                    "secondary-container": "#d5e3fc",
                    "surface-tint": "#0053db",
                    "error": "#ba1a1a",
                    "inverse-primary": "#b4c5ff",
                    "surface-bright": "#f7f9fb",
                    "on-secondary-fixed-variant": "#3a485b",
                    "surface": "#f7f9fb"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "sm": "8px",
                    "lg": "16px",
                    "xs": "4px",
                    "container-padding": "16px",
                    "gutter": "12px",
                    "md": "12px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"],
                    "heading-sm": ["Inter"],
                    "mono-label": ["Geist Mono"]
            },
            "fontSize": {
                    "body-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "label-caps": ["10px", {"lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "body-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "heading-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "mono-label": ["11px", {"lineHeight": "14px", "letterSpacing": "0em", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        /* Custom scrollbar for a denser feel */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #d8dadc;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #c3c6d7;
        }
        
        /* Utility styles for form inputs focus rings */
        .input-focus-ring:focus {
            outline: none;
            border-color: #004ac6;
            box-shadow: 0 0 0 2px #dbe1ff;
        }
        .input-error-ring:focus {
            outline: none;
            border-color: #ba1a1a;
            box-shadow: 0 0 0 2px #ffdad6;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md h-screen w-screen overflow-hidden flex">
<!-- SideNavBar (Shared Component) -->
<aside class="flex flex-col h-full py-lg px-md w-64 border-r border-outline-variant bg-surface-container-low shrink-0 hidden md:flex">
<!-- Header -->
<div class="mb-lg px-sm">
<h1 class="font-heading-sm text-heading-sm font-bold text-primary">TaskChip</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Utility v1.0</p>
</div>
<!-- Navigation Tabs -->
<nav class="flex flex-col gap-xs flex-grow">
<!-- Operations (Inactive) -->
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors cursor-pointer active:opacity-80 rounded" href="#">
<span class="material-symbols-outlined text-[18px]">dashboard</span>
<span class="font-body-md text-body-md">Operations</span>
</a>
<!-- Editor (Active) -->
<a class="flex items-center gap-md px-sm py-sm text-primary font-bold border-r-2 border-primary cursor-pointer active:opacity-80 rounded bg-primary-fixed/20" href="#">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-body-md text-body-md">Editor</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors cursor-pointer active:opacity-80 rounded" href="#">
<span class="material-symbols-outlined text-[18px]">settings</span>
<span class="font-body-md text-body-md">Settings</span>
</a>
<!-- Recovery (Inactive) -->
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors cursor-pointer active:opacity-80 rounded" href="#">
<span class="material-symbols-outlined text-[18px]">history</span>
<span class="font-body-md text-body-md">Recovery</span>
</a>
</nav>
<!-- Footer Actions -->
<div class="mt-auto pt-sm border-t border-outline-variant">
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors cursor-pointer rounded" href="#">
<span class="material-symbols-outlined text-[18px]">delete_sweep</span>
<span class="font-body-md text-body-md">Clear Cache</span>
</a>
<button class="mt-sm w-full bg-surface-container-highest text-on-surface font-body-md text-body-md py-xs rounded border border-outline-variant hover:bg-surface-variant transition-colors">
                Export JSON
            </button>
</div>
</aside>
<!-- Main Content Area -->
<div class="flex flex-col flex-grow h-full overflow-hidden">
<!-- TopAppBar (Shared Component) -->
<header class="flex justify-between items-center w-full px-lg h-12 bg-surface border-b border-outline-variant z-40 shrink-0">
<!-- Left: Brand / Search space -->
<div class="flex items-center gap-md">
<span class="font-heading-sm text-heading-sm font-black text-on-surface hidden md:block">TaskChip Utility</span>
<button class="md:hidden text-on-surface-variant p-xs">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
<!-- Right: Actions -->
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-primary transition-colors duration-150 ease-in-out p-xs rounded-full">
<span class="material-symbols-outlined text-[20px]">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors duration-150 ease-in-out p-xs rounded-full mr-sm">
<span class="material-symbols-outlined text-[20px]">help_outline</span>
</button>
<button class="bg-primary text-on-primary font-body-md text-body-md px-md h-[28px] rounded flex items-center justify-center hover:bg-primary-container transition-colors shadow-sm">
                    New Task
                </button>
</div>
</header>
<!-- Editor Canvas -->
<main class="flex-grow p-container-padding overflow-y-auto bg-background">
<div class="max-w-[720px] mx-auto w-full flex flex-col gap-md">
<!-- Page Header & Feedback State -->
<div class="flex justify-between items-end mb-sm">
<div>
<h2 class="font-heading-sm text-heading-sm font-bold text-on-surface mb-xs">Short Editor</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Create or modify task parameters.</p>
</div>
<!-- Unsaved Changes Indicator -->
<div class="flex items-center gap-xs px-sm py-[2px] bg-tertiary-fixed border border-tertiary-fixed-dim rounded-full">
<div class="w-[6px] h-[6px] rounded-full bg-tertiary"></div>
<span class="font-mono-label text-mono-label text-on-tertiary-fixed">Unsaved Changes</span>
</div>
</div>
<!-- Form Container (Surface Level 1) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-lg shadow-sm">
<form class="flex flex-col gap-lg">
<!-- Row 1: Title (Required + Error State) -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-secondary uppercase flex justify-between" for="task-title">
<span>Task Title <span class="text-error">*</span></span>
</label>
<!-- Error state active: border-error -->
<input class="w-full h-[32px] px-sm bg-surface-container-lowest border border-error rounded font-body-md text-body-md text-on-surface placeholder:text-outline-variant input-error-ring" id="task-title" placeholder="Enter a descriptive title..." type="text" value=""/>
<div class="flex items-center gap-xs text-error mt-[2px]">
<span class="material-symbols-outlined text-[14px]">error</span>
<span class="font-body-sm text-body-sm">Title is required to save this task.</span>
</div>
</div>
<!-- Row 2: Description (Optional) -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-secondary uppercase flex justify-between" for="task-desc">
<span>Description</span>
<span class="text-outline-variant font-body-sm normal-case tracking-normal font-normal">Optional</span>
</label>
<textarea class="w-full p-sm bg-surface-container-lowest border border-outline-variant rounded font-body-md text-body-md text-on-surface placeholder:text-outline-variant input-focus-ring resize-y min-h-[64px]" id="task-desc" placeholder="Add technical details, acceptance criteria, or context..." rows="3"></textarea>
</div>
<!-- Row 3: Priority & Status Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Priority -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-secondary uppercase" for="task-priority">Priority</label>
<div class="relative">
<select class="w-full h-[32px] pl-sm pr-lg bg-surface-container-lowest border border-outline-variant rounded font-body-md text-body-md text-on-surface appearance-none input-focus-ring cursor-pointer" id="task-priority">
<option value="p0">P0 - Critical</option>
<option selected="" value="p1">P1 - High</option>
<option value="p2">P2 - Medium</option>
<option value="p3">P3 - Low</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-[16px]">expand_more</span>
</div>
</div>
<!-- Status -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-secondary uppercase">Status</label>
<!-- Custom segmented control for dense UI -->
<div class="flex items-center bg-surface-container-low border border-outline-variant rounded h-[32px] p-[2px]">
<label class="flex-1 h-full relative cursor-pointer group">
<input checked="" class="peer sr-only" name="status" type="radio" value="todo"/>
<div class="w-full h-full flex items-center justify-center font-body-md text-body-md text-on-surface-variant peer-checked:bg-surface-container-lowest peer-checked:text-on-surface peer-checked:shadow-sm rounded-[2px] transition-all">
                                            To Do
                                        </div>
</label>
<label class="flex-1 h-full relative cursor-pointer group">
<input class="peer sr-only" name="status" type="radio" value="in-progress"/>
<div class="w-full h-full flex items-center justify-center font-body-md text-body-md text-on-surface-variant peer-checked:bg-surface-container-lowest peer-checked:text-on-surface peer-checked:shadow-sm rounded-[2px] transition-all">
                                            In Progress
                                        </div>
</label>
<label class="flex-1 h-full relative cursor-pointer group">
<input class="peer sr-only" name="status" type="radio" value="blocked"/>
<div class="w-full h-full flex items-center justify-center font-body-md text-body-md text-on-surface-variant peer-checked:bg-error-container peer-checked:text-on-error-container peer-checked:shadow-sm rounded-[2px] transition-all">
                                            Blocked
                                        </div>
</label>
</div>
</div>
</div>
<!-- Divider -->
<div class="h-[1px] w-full bg-outline-variant my-xs"></div>
<!-- Footer Actions -->
<div class="flex justify-end gap-sm pt-xs">
<button class="h-[32px] px-lg bg-surface-container-lowest border border-outline-variant text-on-surface font-heading-sm text-heading-sm rounded hover:bg-surface-variant transition-colors flex items-center justify-center" type="button">
                                Cancel
                            </button>
<button class="h-[32px] px-lg bg-primary text-on-primary font-heading-sm text-heading-sm rounded hover:bg-primary-container transition-colors flex items-center justify-center gap-xs shadow-sm" type="button">
<span class="material-symbols-outlined text-[16px]">save</span>
                                Save Task
                            </button>
</div>
</form>
</div>
<!-- Helper Text / Metadata -->
<div class="text-center font-body-sm text-body-sm text-outline mt-sm">
                    Press <kbd class="font-mono-label bg-surface-container-high border border-outline-variant px-1 rounded text-on-surface">⌘</kbd> + <kbd class="font-mono-label bg-surface-container-high border border-outline-variant px-1 rounded text-on-surface">S</kbd> to quick save.
                </div>
</div>
</main>
</div>
</body></html>
